services:
  mysql:
    image: mysql:8.4
    container_name: phaseolus_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: phaseolus
      MYSQL_USER: phaseolus_user
      MYSQL_PASSWORD: phaseolus_pass
    ports:
      - "3306:3306"
    volumes:
      - phaseolus_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  phaseolus_mysql_data:
