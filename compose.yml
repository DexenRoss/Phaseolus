services:
  db:
    image: mysql:8.4
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: phaseolus
      MYSQL_USER: phaseolus
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - ${MYSQL_PORT:-3306}:3306
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
  web:
    build:
      context: .
      dockerfile: ./.docker/web/Dockerfile
    env_file: .env
    ports:
      - ${NEXT_PORT:-3000}:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - type: bind
        source: .
        target: /app
      - web_node_modules:/app/node_modules
      - /app/node_modules

volumes:
  dbdata:
  web_node_modules:
