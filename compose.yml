services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: phaseolus
      MYSQL_USER: phaseolus_user
      MYSQL_PASSWORD: phaseolus_pass
    ports:
      - "3306:3306"
    volumes:
      - phaseolus_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
  web:
    build:
      context: .
      dockerfile: ./.docker/web/Dockerfile
    env_file: .env
    ports:
      - ${NEXT_PORT:-3000}:3000
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - type: bind
        source: .
        target: /app
      - web_node_modules:/app/node_modules
      - /app/node_modules

volumes:
  phaseolus_mysql_data:
  web_node_modules:
