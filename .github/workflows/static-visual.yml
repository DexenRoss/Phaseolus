name: Deploy Visual Preview to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Make codebase static-compatible
        run: |
          sed -i 's/reactCompiler: true,/reactCompiler: true, output: "export", basePath: "\/Phaseolus", assetPrefix: "\/Phaseolus\/", images: { unoptimized: true },/' next.config.ts
          rm -rf src/app/api src/app/dashboard src/app/admin src/app/login src/app/register src/app/verify-email src/app/forbidden
          # Fix absolute paths for GitHub Pages sub-directory
          sed -i 's/\/seedance_frames_webp/\/Phaseolus\/seedance_frames_webp/g' src/components/ScrollFrames.tsx
          sed -i 's/\/unam-logo.svg/\/Phaseolus\/unam-logo.svg/g' src/app/page.tsx src/app/graphs/page.tsx
      - name: Build with Next.js
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
